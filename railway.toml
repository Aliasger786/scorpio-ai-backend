[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn aura_ai.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/v1/auth/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
DJANGO_SETTINGS_MODULE = "aura_ai.settings"
PYTHON_VERSION = "3.11"
