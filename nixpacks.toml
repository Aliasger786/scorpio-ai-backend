[phases.setup]
nixPkgs = ["...", "python311", "gcc", "pkg-config", "openssl.dev"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate",
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  ". /opt/venv/bin/activate",
  "python manage.py collectstatic --noinput",
  "python manage.py migrate"
]

[start]
cmd = ". /opt/venv/bin/activate && gunicorn aura_ai.wsgi:application --bind 0.0.0.0:$PORT"
